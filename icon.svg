<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Tron identity disc">
  <defs>
    <radialGradient id="discGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#00d9ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="256" height="256" fill="#03060c"/>

  <g transform="translate(128 128)" filter="url(#neon)">
    <!-- ambient glow -->
    <circle r="108" fill="url(#discGlow)"/>

    <!-- outer ring -->
    <circle r="100" fill="none" stroke="#00d9ff" stroke-width="3"/>

    <!-- inner rings -->
    <circle r="78" fill="none" stroke="#00d9ff" stroke-width="2" opacity="0.85"/>
    <circle r="56" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.7"/>
    <circle r="34" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.85"/>

    <!-- radial spokes (12 segments) -->
    <g stroke="#00d9ff" stroke-width="1.5" opacity="0.75">
      <line x1="0" y1="-100" x2="0" y2="-34"/>
      <line x1="0" y1="34" x2="0" y2="100"/>
      <line x1="-100" y1="0" x2="-34" y2="0"/>
      <line x1="34" y1="0" x2="100" y2="0"/>
      <line x1="-87" y1="-50" x2="-29" y2="-17"/>
      <line x1="29" y1="17" x2="87" y2="50"/>
      <line x1="-87" y1="50" x2="-29" y2="17"/>
      <line x1="29" y1="-17" x2="87" y2="-50"/>
      <line x1="-50" y1="-87" x2="-17" y2="-29"/>
      <line x1="17" y1="29" x2="50" y2="87"/>
      <line x1="50" y1="-87" x2="17" y2="-29"/>
      <line x1="-17" y1="29" x2="-50" y2="87"/>
    </g>

    <!-- segment ticks on outer edge -->
    <g stroke="#66e8ff" stroke-width="2" stroke-linecap="round" opacity="0.9">
      <line x1="0" y1="-108" x2="0" y2="-96"/>
      <line x1="54" y1="-93" x2="50" y2="-82"/>
      <line x1="93" y1="-54" x2="82" y2="-50"/>
      <line x1="108" y1="0" x2="96" y2="0"/>
      <line x1="93" y1="54" x2="82" y2="50"/>
      <line x1="54" y1="93" x2="50" y2="82"/>
      <line x1="0" y1="108" x2="0" y2="96"/>
      <line x1="-54" y1="93" x2="-50" y2="82"/>
      <line x1="-93" y1="54" x2="-82" y2="50"/>
      <line x1="-108" y1="0" x2="-96" y2="0"/>
      <line x1="-93" y1="-54" x2="-82" y2="-50"/>
      <line x1="-54" y1="-93" x2="-50" y2="-82"/>
    </g>

    <!-- hub -->
    <circle r="12" fill="#03060c" stroke="#00d9ff" stroke-width="2"/>
    <circle r="4" fill="#00d9ff"/>
  </g>
</svg>
